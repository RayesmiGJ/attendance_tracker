<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>
    <style>
        :root {
            --moss-dark: #3D4127;
            --moss-green: #636B2F;
            --moss-light: #BAC095;
            --moss-pale: #D4DE95;
        }
        
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--moss-light);
            margin: 0;
            padding: 30px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid var(--moss-green);
        }
        
        h2 {
            color: var(--moss-dark);
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 500;
            text-align: center;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        th {
            background-color: var(--moss-green);
            color: white;
            padding: 15px 10px;
            font-size: 18px;
            font-weight: 500;
        }
        
        td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--moss-light);
            font-size: 16px;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tr:hover {
            background-color: var(--moss-pale);
        }
        
        .present {
            color: var(--moss-dark);
            font-weight: 500;
        }
        
        .present::before {
            content: "✓ ";
            color: var(--moss-green);
            font-weight: bold;
        }
        
        .back {
            background-color: var(--moss-pale);
            color: var(--moss-dark);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            border: 2px solid var(--moss-green);
            font-size: 16px;
            transition: 0.2s;
        }
        
        .back:hover {
            background-color: var(--moss-green);
            color: white;
        }
        
        .no-records {
            text-align: center;
            color: var(--moss-dark);
            font-style: italic;
            padding: 20px;
            background-color: var(--moss-pale);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your Attendance Records</h2>
        
        <table>
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>
            {% for record in records %}
            <tr>
                <td>{{ record.date }}</td>
                <td class="present">Present</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="no-records">No records found</td>
            </tr>
            {% endfor %}
        </table>
        {% if user.username == 'ray' %}
          <a href="{% url 'admin_dashboard' %}"><button class="back">Back</button></a>
       {% else %}
          <a href="{% url 'user_dashboard' %}"><button class="back">Back</button></a>
        {% endif %}
    </div>
</body>
</html>
